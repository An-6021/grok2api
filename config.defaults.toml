[grok]
temporary = true
stream = true
thinking = true
dynamic_statsig = true
filter_tags = ["xaiartifact","xai:tool_usage_card","grok:render"]
timeout = 120
base_proxy_url = ""
asset_proxy_url = ""
cf_clearance = ""
imagine_ws_url = "wss://grok.com/ws/imagine/listen"
imagine_timeout = 120
imagine_receive_timeout_sec = 5
imagine_blocked_after_sec = 15
imagine_idle_finish_sec = 10
imagine_default_aspect_ratio = "2:3"
imagine_enable_nsfw = true
imagine_auto_age_verify = true
imagine_birth_date = "2001-01-01T16:00:00.000Z"
imagine_stream_heartbeat_sec = 5
imagine_stream_timeout_buffer_sec = 15
imagine_chat_default_n = 1
max_retry = 3
retry_status_codes = [401,429,403]
nsfw_feature_key = "always_show_nsfw_content"
nsfw_apply_concurrency = 5
nsfw_apply_delay_ms = 500
# 重试退避配置
retry_backoff_base = 0.5
retry_backoff_factor = 2.0
retry_backoff_max = 30.0
retry_budget = 90.0
# 流空闲超时配置 (秒)
stream_idle_timeout = 45.0
video_idle_timeout = 90.0

[app]
app_url = "http://127.0.0.1:8000"
app_key = "grok2api"
api_key = ""
image_format = "url"
video_format = "html"

[token]
auto_refresh = true
refresh_interval_hours = 8
super_refresh_interval_hours = 2
fail_threshold = 5
save_delay_ms = 500
reload_interval_sec = 30

[cache]
enable_auto_clean = true
limit_mb = 1024

[performance]
assets_max_concurrent = 25
media_max_concurrent = 50
usage_max_concurrent = 25
imagine_max_concurrent = 20
assets_delete_batch_size = 10
assets_batch_size = 10
assets_max_tokens = 1000
usage_batch_size = 50
usage_max_tokens = 1000
nsfw_max_concurrent = 10
nsfw_batch_size = 50
nsfw_max_tokens = 1000
